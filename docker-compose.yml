services:
  system:
    build:
      context: .
      dockerfile: Dockerfile.system
    env_file:
      - .env
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
      - "8005:8005"
      - "8006:8006"
      - "3001:3001"   
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    network_mode: "service:system"  
    depends_on:
      system:
        condition: service_healthy
    restart: unless-stopped


  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.system
    env_file:
      - .env
    ports:
      - "8007:8007"
    command: python -m mcp_server
    restart: unless-stopped
    depends_on:
      - system